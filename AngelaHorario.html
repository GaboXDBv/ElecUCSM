<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horario semanal</title>
  <style>
    :root{
      --bg: #f3f4f6;
      --panel: #ffffff;
      --line: #e6e8ee;
      --line-strong: #d8dce6;
      --text: #1f2937;
      --muted: #6b7280;
      --today: #2563eb;

      --inst1: #f4bf25;
      --inst2: #1098d4;
      --inst3: #7b88cf;
      --inst4: #ff541c;
      --inst5: #df7b71;
      --inst6: #39b77a;

      --work: rgba(221, 168, 190, 0.75);
      --work-border: rgba(184, 126, 151, 0.9);

      --radius: 20px;
      --day-header-h: 92px;
      --time-col-w: 84px;
      --hour-h: 68px;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; }

    body{
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #f7f7f8 0%, #eef1f6 100%);
      color: var(--text);
      padding: 24px;
    }

    .wrap{
      max-width: 1500px;
      margin: 0 auto;
    }

    .topbar{
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .title-box h1{
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .title-box p{
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .controls{
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn{
      border: none;
      padding: 10px 16px;
      border-radius: 999px;
      background: white;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(0,0,0,.05);
      transition: .2s ease;
    }

    .btn:hover{
      transform: translateY(-1px);
    }

    .btn.active{
      background: var(--today);
      color: white;
    }

    .legend{
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .legend-item{
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,.75);
      padding: 7px 12px;
      border-radius: 999px;
      box-shadow: 0 2px 10px rgba(0,0,0,.04);
    }

    .dot{
      width: 12px;
      height: 12px;
      border-radius: 999px;
      display: inline-block;
    }

    .calendar{
      position: relative;
      background: var(--panel);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid #eceff4;
    }

    .days{
      display: grid;
      grid-template-columns: var(--time-col-w) repeat(6, 1fr);
      min-height: var(--day-header-h);
      border-bottom: 1px solid var(--line-strong);
      background: linear-gradient(180deg, #fbfbfc 0%, #f5f6f8 100%);
    }

    .corner{
      border-right: 1px solid var(--line);
    }

    .day{
      padding: 14px 14px 12px;
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
    }

    .day:last-child{
      border-right: none;
    }

    .day .dow{
      font-size: 13px;
      font-weight: 800;
      color: #666;
      letter-spacing: .08em;
    }

    .day .num{
      font-size: 18px;
      font-weight: 800;
      color: #222;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 999px;
    }

    .day.today .dow{
      color: var(--today);
    }

    .day.today .num{
      background: var(--today);
      color: white;
      box-shadow: 0 8px 18px rgba(37,99,235,.28);
    }

    .body{
      display: grid;
      grid-template-columns: var(--time-col-w) 1fr;
      position: relative;
      min-height: calc(var(--hour-h) * 13);
    }

    .times{
      position: relative;
      border-right: 1px solid var(--line);
      background: #fbfbfc;
    }

    .time{
      height: var(--hour-h);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 8px;
      font-size: 14px;
      color: #4b5563;
      font-weight: 600;
    }

    .grid{
      position: relative;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
    }

    .col{
      position: relative;
      border-right: 1px solid var(--line);
    }

    .col:last-child{
      border-right: none;
    }

    .hour-line{
      position: absolute;
      left: 0;
      right: 0;
      height: var(--hour-h);
      border-bottom: 1px solid var(--line);
      pointer-events: none;
    }

    .event{
      position: absolute;
      left: 8px;
      right: 8px;
      border-radius: 10px;
      padding: 10px 12px;
      color: white;
      font-weight: 800;
      font-size: 14px;
      line-height: 1.2;
      box-shadow: 0 4px 14px rgba(0,0,0,.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      transition: .18s ease;
    }

    .event:hover{
      transform: scale(1.01);
    }

    .event small{
      display: block;
      font-size: 12px;
      font-weight: 700;
      opacity: .95;
      margin-top: 4px;
    }

    .event.work{
      color: #6b3f52;
      background: var(--work);
      border: 1px solid var(--work-border);
      box-shadow: none;
      font-weight: 700;
    }

    .event.work small{
      color: #7a4f63;
      opacity: 1;
    }

    .line-now{
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: #ef4444;
      z-index: 30;
      box-shadow: 0 0 0 2px rgba(239,68,68,.12);
    }

    .line-now::before{
      content: "";
      position: absolute;
      left: -5px;
      top: 50%;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #ef4444;
      transform: translateY(-50%);
    }

    .empty-state{
      padding: 20px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 980px){
      body{
        padding: 10px;
      }
      .calendar{
        border-radius: 18px;
      }
      .day .dow{
        font-size: 11px;
      }
      .day .num{
        width: 34px;
        height: 34px;
        font-size: 15px;
      }
      .event{
        font-size: 12px;
        padding: 8px;
      }
      .event small{
        font-size: 11px;
      }
      :root{
        --time-col-w: 62px;
        --hour-h: 60px;
      }
    }

    @media (max-width: 780px){
      .calendar{
        overflow-x: auto;
      }
      .days, .body{
        min-width: 980px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title-box">
        <h1>Horario semanal</h1>
        <p>Trabajo + Instituto · Vista semanal estilo calendario</p>
      </div>

      <div class="controls">
        <button class="btn active" data-filter="all">Todo</button>
        <button class="btn" data-filter="instituto">Instituto</button>
        <button class="btn" data-filter="trabajo">Trabajo</button>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><span class="dot" style="background:#1098d4"></span> Instituto</div>
      <div class="legend-item"><span class="dot" style="background:rgba(221,168,190,.95)"></span> Trabajo</div>
      <div class="legend-item"><span class="dot" style="background:#ef4444"></span> Hora actual</div>
    </div>

    <div class="calendar">
      <div class="days">
        <div class="corner"></div>
        <div class="day today">
          <span class="dow">LUN</span>
          <span class="num">23</span>
        </div>
        <div class="day">
          <span class="dow">MAR</span>
          <span class="num">24</span>
        </div>
        <div class="day">
          <span class="dow">MIÉ</span>
          <span class="num">25</span>
        </div>
        <div class="day">
          <span class="dow">JUE</span>
          <span class="num">26</span>
        </div>
        <div class="day">
          <span class="dow">VIE</span>
          <span class="num">27</span>
        </div>
        <div class="day">
          <span class="dow">SÁB</span>
          <span class="num">28</span>
        </div>
      </div>

      <div class="body">
        <div class="times" id="times"></div>
        <div class="grid" id="grid"></div>
      </div>
    </div>
  </div>

  <script>
    const startHour = 8;
    const endHour = 21; // hasta 21:00
    const totalHours = endHour - startHour;
    const hourHeight = 68; // mismo valor que --hour-h

    // day: 0=Lun, 1=Mar, 2=Mié, 3=Jue, 4=Vie, 5=Sáb
    const events = [
      // INSTITUTO
      {
        type: "instituto",
        day: 0,
        title: "LEGISLACIÓN Y ÉTICA - VIRTUAL",
        location: "",
        start: "08:00",
        end: "10:15",
        color: "#f4bf25"
      },
      {
        type: "instituto",
        day: 0,
        title: "GESTIÓN EMPRESARIAL - A05",
        location: "",
        start: "11:15",
        end: "13:30",
        color: "#1098d4"
      },
      {
        type: "instituto",
        day: 1,
        title: "GERENCIA DE MARKETING - A05",
        location: "",
        start: "14:30",
        end: "16:45",
        color: "#7b88cf"
      },
      {
        type: "instituto",
        day: 3,
        title: "GERENCIA DE MARKETING - A03",
        location: "",
        start: "13:30",
        end: "15:15",
        color: "#7b88cf"
      },
      {
        type: "instituto",
        day: 3,
        title: "TALLER DE MEDIOS INTEGRADOS - LC2",
        location: "",
        start: "15:15",
        end: "17:30",
        color: "#ff541c"
      },
      {
        type: "instituto",
        day: 4,
        title: "PROYECTOS DE INNOVACIÓN - A03",
        location: "",
        start: "12:15",
        end: "14:15",
        color: "#df7b71"
      },
      {
        type: "instituto",
        day: 5,
        title: "CREACIÓN DE NUEVOS PRODUCTOS - A06",
        location: "",
        start: "08:00",
        end: "11:00",
        color: "#39b77a"
      },
      {
        type: "instituto",
        day: 5,
        title: "PROYECTOS DE INNOVACIÓN - A06",
        location: "",
        start: "11:15",
        end: "12:45",
        color: "#df7b71"
      },

      // TRABAJO (según tu imagen)
      {
        type: "trabajo",
        day: 0,
        title: "Trabajo",
        location: "Anghela",
        start: "16:00",
        end: "19:00"
      },
      {
        type: "trabajo",
        day: 1,
        title: "Trabajo",
        location: "Anghela",
        start: "10:00",
        end: "13:00"
      },
      {
        type: "trabajo",
        day: 1,
        title: "Trabajo",
        location: "Anghela",
        start: "19:00",
        end: "21:00"
      },
      {
        type: "trabajo",
        day: 2,
        title: "Trabajo",
        location: "Anghela",
        start: "10:00",
        end: "13:00"
      },
      {
        type: "trabajo",
        day: 2,
        title: "Trabajo",
        location: "Anghela",
        start: "14:00",
        end: "18:00"
      },
      {
        type: "trabajo",
        day: 3,
        title: "Trabajo",
        location: "Anghela",
        start: "10:00",
        end: "12:00"
      },
      {
        type: "trabajo",
        day: 3,
        title: "Trabajo",
        location: "Anghela",
        start: "20:00",
        end: "21:00"
      },
      {
        type: "trabajo",
        day: 4,
        title: "Trabajo",
        location: "Anghela",
        start: "10:00",
        end: "11:00"
      },
      {
        type: "trabajo",
        day: 4,
        title: "Trabajo",
        location: "Anghela",
        start: "17:00",
        end: "19:00"
      }
    ];

    const timesEl = document.getElementById("times");
    const gridEl = document.getElementById("grid");

    function toMinutes(timeStr){
      const [h, m] = timeStr.split(":").map(Number);
      return h * 60 + m;
    }

    function minutesFromStart(timeStr){
      return toMinutes(timeStr) - startHour * 60;
    }

    function formatHour(h){
      return `${h}`;
    }

    function buildCalendar(filter = "all"){
      timesEl.innerHTML = "";
      gridEl.innerHTML = "";

      // Columna de horas
      for(let h = startHour; h < endHour; h++){
        const t = document.createElement("div");
        t.className = "time";
        t.textContent = formatHour(h);
        timesEl.appendChild(t);
      }

      // 6 columnas (Lun-Sáb)
      for(let day = 0; day < 6; day++){
        const col = document.createElement("div");
        col.className = "col";

        for(let i = 0; i < totalHours; i++){
          const line = document.createElement("div");
          line.className = "hour-line";
          line.style.top = `${i * hourHeight}px`;
          col.appendChild(line);
        }

        const filtered = events.filter(ev => {
          if(ev.day !== day) return false;
          if(filter === "all") return true;
          return ev.type === filter;
        });

        filtered.forEach(ev => {
          const startMin = minutesFromStart(ev.start);
          const endMin = minutesFromStart(ev.end);
          const top = (startMin / 60) * hourHeight;
          const height = ((endMin - startMin) / 60) * hourHeight;

          const card = document.createElement("div");
          card.className = `event ${ev.type === "trabajo" ? "work" : ""}`;
          card.style.top = `${top + 2}px`;
          card.style.height = `${Math.max(height - 4, 28)}px`;

          if(ev.type === "instituto"){
            card.style.background = ev.color;
            card.style.borderLeft = "4px solid rgba(255,255,255,.55)";
          }

          card.innerHTML = `
            <div>${ev.title}</div>
            <small>${formatTime(ev.start)} – ${formatTime(ev.end)}${ev.location ? `</small><small>${ev.location}` : ""}</small>
          `;

          col.appendChild(card);
        });

        gridEl.appendChild(col);
      }

      drawCurrentTimeLine();
    }

    function formatTime(t){
      const [h, m] = t.split(":").map(Number);
      const suffix = h >= 12 ? "pm" : "am";
      let hh = h % 12;
      if(hh === 0) hh = 12;
      return `${hh}:${String(m).padStart(2, "0")}${suffix}`;
    }

    function drawCurrentTimeLine(){
      document.querySelectorAll(".line-now").forEach(el => el.remove());

      const now = new Date();
      let jsDay = now.getDay(); // dom=0, lun=1, ..., sab=6
      if(jsDay === 0 || jsDay === 6 + 1) return;

      const mapDay = {1:0, 2:1, 3:2, 4:3, 5:4, 6:5};
      const currentDay = mapDay[jsDay];
      if(currentDay === undefined) return;

      const totalMinutesNow = now.getHours() * 60 + now.getMinutes();
      const fromStart = totalMinutesNow - startHour * 60;
      if(fromStart < 0 || totalMinutesNow > endHour * 60) return;

      const cols = document.querySelectorAll(".col");
      const targetCol = cols[currentDay];
      if(!targetCol) return;

      const line = document.createElement("div");
      line.className = "line-now";
      line.style.top = `${(fromStart / 60) * hourHeight}px`;
      targetCol.appendChild(line);
    }

    document.querySelectorAll(".btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        buildCalendar(btn.dataset.filter);
      });
    });

    buildCalendar("all");
    setInterval(drawCurrentTimeLine, 60000);
  </script>
</body>
</html>
